# Night stop — 8:00 PM Pacific (America/Los_Angeles).
# Cron is UTC: 03:00 = 8pm PDT, 04:00 = 8pm PST. Script no-ops if not asleep.
name: Railway Night Stop

on:
  schedule:
    - cron: "0 3 * * *"
    - cron: "0 4 * * *"
  workflow_dispatch:

jobs:
  stop:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Stop combined camera and inference service
        env:
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
          RAILWAY_SERVICE_ID: ${{ secrets.RAILWAY_SERVICE_ID }}
          RAILWAY_ENVIRONMENT_ID: ${{ secrets.RAILWAY_ENVIRONMENT_ID }}
        run: node scripts/railway-toggle.js --stop
