name: Railway Camera Idle Check

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Stop an idle nighttime camera service
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          curl --fail-with-body --silent --show-error \
            --header "Authorization: Bearer ${CRON_SECRET}" \
            https://saras-birdhouse.vercel.app/api/bridge/idle-check
