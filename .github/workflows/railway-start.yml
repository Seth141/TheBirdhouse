# Dawn start — 5:00 AM Pacific (America/Los_Angeles).
# Cron is UTC: 12:00 = 5am PDT, 13:00 = 5am PST. Script no-ops if still asleep.
name: Railway Morning Start

on:
  schedule:
    - cron: "0 12 * * *"
    - cron: "0 13 * * *"
  workflow_dispatch:

jobs:
  start:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Start combined camera and inference service
        env:
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
          RAILWAY_SERVICE_ID: ${{ secrets.RAILWAY_SERVICE_ID }}
          RAILWAY_ENVIRONMENT_ID: ${{ secrets.RAILWAY_ENVIRONMENT_ID }}
        run: node scripts/railway-toggle.js --start
